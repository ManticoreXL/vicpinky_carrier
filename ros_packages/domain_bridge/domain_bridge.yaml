  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # omx  (domain 45 ↔ 40)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /omx/joint_states:
    type: sensor_msgs/msg/JointState
    from_domain: 45
    to_domain: 40

  /omx/cmd_vel:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
