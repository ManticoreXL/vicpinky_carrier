# ROS2 Domain Bridge 설정
# 각 로봇 도메인 → 서버 도메인(40)으로 토픽 브리지
# 서버(rosbridge/slam/nav2)는 도메인 40, 각 로봇은 자기 도메인에서만 통신
#
# 방향:
#   센서 데이터 : 로봇 도메인 → 40  (단방향)
#   cmd_vel     : 40 → 로봇 도메인  (단방향)
#   TF          : 로봇 도메인 → 40  (slam_toolbox가 필요)

topics:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # tb3_01  (domain 41 ↔ 40)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # 센서 → 서버 (41 → 40)
  - topic: /tb3_01/scan
    type: sensor_msgs/msg/LaserScan
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/odom
    type: nav_msgs/msg/Odometry
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/battery_state
    type: sensor_msgs/msg/BatteryState
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/imu
    type: sensor_msgs/msg/Imu
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/joint_states
    type: sensor_msgs/msg/JointState
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/magnetic_field
    type: sensor_msgs/msg/MagneticField
    from_domain: 41
    to_domain: 40

  - topic: /tb3_01/sensor_state
    type: turtlebot3_msgs/msg/SensorState
    from_domain: 41
    to_domain: 40

  # TF → 서버 (slam_toolbox/nav2가 로봇 odom→base_footprint 필요)
  - topic: /tf
    type: tf2_msgs/msg/TFMessage
    from_domain: 41
    to_domain: 40
    remap: /tb3_01/tf

  - topic: /tf_static
    type: tf2_msgs/msg/TFMessage
    from_domain: 41
    to_domain: 40
    remap: /tb3_01/tf_static

  # cmd_vel → 로봇 (40 → 41)
  - topic: /tb3_01/cmd_vel
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
    to_domain: 41

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # tb3_02  (domain 42 ↔ 40)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - topic: /tb3_02/scan
    type: sensor_msgs/msg/LaserScan
    from_domain: 42
    to_domain: 40

  - topic: /tb3_02/odom
