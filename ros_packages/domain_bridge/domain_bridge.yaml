  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # tb3_04  (domain 44 ↔ 40)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /tb3_04/scan:
    type: sensor_msgs/msg/LaserScan
    from_domain: 44
    to_domain: 40

  /tb3_04/odom:
    type: nav_msgs/msg/Odometry
    from_domain: 44
    to_domain: 40

  /tb3_04/battery_state:
    type: sensor_msgs/msg/BatteryState
    from_domain: 44
    to_domain: 40

  /tb3_04/imu:
    type: sensor_msgs/msg/Imu
    from_domain: 44
    to_domain: 40

  /tb3_04/joint_states:
    type: sensor_msgs/msg/JointState
    from_domain: 44
    to_domain: 40

  /tb3_04/magnetic_field:
    type: sensor_msgs/msg/MagneticField
    from_domain: 44
    to_domain: 40

  /tb3_04/sensor_state:
    type: turtlebot3_msgs/msg/SensorState
    from_domain: 44
    to_domain: 40

  /tb3_04/cmd_vel:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
