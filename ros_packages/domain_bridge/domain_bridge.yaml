  - topic: /tb3_02/battery_state
    type: sensor_msgs/msg/BatteryState
    from_domain: 42
    to_domain: 40

  - topic: /tb3_02/imu
    type: sensor_msgs/msg/Imu
    from_domain: 42
    to_domain: 40

  - topic: /tb3_02/joint_states
    type: sensor_msgs/msg/JointState
    from_domain: 42
    to_domain: 40

  - topic: /tb3_02/magnetic_field
    type: sensor_msgs/msg/MagneticField
    from_domain: 42
    to_domain: 40

  - topic: /tb3_02/sensor_state
    type: turtlebot3_msgs/msg/SensorState
    from_domain: 42
    to_domain: 40

  - topic: /tf
    type: tf2_msgs/msg/TFMessage
    from_domain: 42
    to_domain: 40
    remap: /tb3_02/tf

  - topic: /tf_static
    type: tf2_msgs/msg/TFMessage
    from_domain: 42
    to_domain: 40
    remap: /tb3_02/tf_static

  - topic: /tb3_02/cmd_vel
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
    to_domain: 42

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
