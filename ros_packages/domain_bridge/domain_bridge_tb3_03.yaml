name: domain_bridge_tb3_03
topics:

  # ── UPLINK: 로봇(43)의 순정 데이터를 가져와서 관제탑(40)에 꼬리표 달아주기 ──
  /scan:
    type: sensor_msgs/msg/LaserScan
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/scan

  /odom:
    type: nav_msgs/msg/Odometry
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/odom

  /battery_state:
    type: sensor_msgs/msg/BatteryState
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/battery_state

  /imu:
    type: sensor_msgs/msg/Imu
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/imu

  /joint_states:
    type: sensor_msgs/msg/JointState
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/joint_states

  /magnetic_field:
    type: sensor_msgs/msg/MagneticField
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/magnetic_field

  /sensor_state:
    type: turtlebot3_msgs/msg/SensorState
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/sensor_state

  /robot_description:
    type: std_msgs/msg/String
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/robot_description

  /detected_person:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/detected_person

  /mode:
    type: std_msgs/msg/String
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/mode

  /yolo/person_detected:
    type: std_msgs/msg/Bool
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/yolo/person_detected

  /tf:
    type: tf2_msgs/msg/TFMessage
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/tf

  /tf_static:
    type: tf2_msgs/msg/TFMessage
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/tf_static

  /amcl_pose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/amcl_pose

  /plan:
    type: nav_msgs/msg/Path
    from_domain: 43
    to_domain: 40
    remap: /tb3_03/plan

  # ── DOWNLINK: 관제탑(40)의 꼬리표 달린 명령을 로봇(43)에게 순정으로 떼서 주기 ──
  /tb3_03/cmd_vel:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
    to_domain: 43
    remap: /cmd_vel

  /tb3_03/cmd:
    type: std_msgs/msg/String
    from_domain: 40
    to_domain: 43
    remap: /cmd

  /tb3_03/goal_pose:
    type: geometry_msgs/msg/PoseStamped
    from_domain: 40
    to_domain: 43
    remap: /goal_pose

  /tb3_03/initialpose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: 40
    to_domain: 43
    remap: /initialpose

services:

  # ── DOWNLINK SERVICES: 관제탑(40)에서 로봇(43)의 서비스 호출하기 ──
  /tb3_03/reset:
    type: std_srvs/srv/Trigger
    from_domain: 40
    to_domain: 43
    remap: /reset

  /tb3_03/reset_odometry:
    type: std_srvs/srv/Trigger
    from_domain: 40
    to_domain: 43
    remap: /reset_odometry

  /tb3_03/motor_power:
    type: std_srvs/srv/SetBool
    from_domain: 40
    to_domain: 43
    remap: /motor_power

  /tb3_03/sound:
    type: turtlebot3_msgs/srv/Sound
    from_domain: 40
    to_domain: 43
    remap: /sound

  /tb3_03/run_diagnosis:
    type: turtlebot3_custom_msgs/srv/SelfDiagnosis
    from_domain: 40
    to_domain: 43
    remap: /run_diagnosis
