name: domain_bridge_tb3_04
topics:

  # ── UPLINK: 로봇(44)의 순정 데이터를 가져와서 관제탑(40)에 꼬리표 달아주기 ──
  /scan:
    type: sensor_msgs/msg/LaserScan
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/scan

  /odom:
    type: nav_msgs/msg/Odometry
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/odom

  /battery_state:
    type: sensor_msgs/msg/BatteryState
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/battery_state

  /imu:
    type: sensor_msgs/msg/Imu
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/imu

  /joint_states:
    type: sensor_msgs/msg/JointState
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/joint_states

  /magnetic_field:
    type: sensor_msgs/msg/MagneticField
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/magnetic_field

  /sensor_state:
    type: turtlebot3_msgs/msg/SensorState
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/sensor_state

  /robot_description:
    type: std_msgs/msg/String
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/robot_description

  /detected_person:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/detected_person

  /mode:
    type: std_msgs/msg/String
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/mode

  /yolo/person_detected:
    type: std_msgs/msg/Bool
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/yolo/person_detected

  /tf:
    type: tf2_msgs/msg/TFMessage
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/tf

  /tf_static:
    type: tf2_msgs/msg/TFMessage
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/tf_static

  /amcl_pose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: 44
    to_domain: 40
    remap: /tb3_04/amcl_pose

  # ── DOWNLINK: 관제탑(40)의 꼬리표 달린 명령을 로봇(44)에게 순정으로 떼서 주기 ──
  /tb3_04/cmd_vel:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 40
    to_domain: 44
    remap: /cmd_vel

  /tb3_04/cmd:
    type: std_msgs/msg/String
    from_domain: 40
    to_domain: 44
    remap: /cmd

  /tb3_04/goal_pose:
    type: geometry_msgs/msg/PoseStamped
    from_domain: 40
    to_domain: 44
    remap: /goal_pose

  /tb3_04/initialpose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: 40
    to_domain: 44
    remap: /initialpose

services:

  # ── DOWNLINK SERVICES: 관제탑(40)에서 로봇(44)의 서비스 호출하기 ──
  /tb3_04/reset:
    type: std_srvs/srv/Trigger
    from_domain: 40
    to_domain: 44
    remap: /reset

  /tb3_04/reset_odometry:
    type: std_srvs/srv/Trigger
    from_domain: 40
    to_domain: 44
    remap: /reset_odometry

  /tb3_04/motor_power:
    type: std_srvs/srv/SetBool
    from_domain: 40
    to_domain: 44
    remap: /motor_power

  /tb3_04/sound:
    type: turtlebot3_msgs/srv/Sound
    from_domain: 40
    to_domain: 44
    remap: /sound

  /tb3_04/run_diagnosis:
    type: turtlebot3_custom_msgs/srv/SelfDiagnosis
    from_domain: 40
    to_domain: 44
    remap: /run_diagnosis